[general]
email = "azim@example.com"

[logger]
level = "info"
messageFormat = "%(asctime)s | %(levelname)s | %(name)s | %(funcName)s:%(lineno)d | %(message)s"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
port = 8501
address = "0.0.0.0"
headless = true
runOnSave = false
fileWatcherType = "none"
maxUploadSize = 10
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"